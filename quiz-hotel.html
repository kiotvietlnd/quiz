<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đánh Giá Năng Lực Thành Viên</title>
    <style>
        :root {
            --primary-color: #005a9e;
            --primary-hover: #004578;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --neutral-dark: #1f2937;
            --neutral-light: #f3f4f6;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: var(--neutral-dark);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Form đăng nhập */
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            max-width: 500px;
            margin: 3rem auto;
            border: 1px solid var(--border-color);
        }

        .auth-card h2 { margin-bottom: 1.5rem; color: var(--primary-color); text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        .form-control:focus {
            border-color: var(--primary-color);
        }

        /* Giao diện làm bài */
        .quiz-layout {
            display: none;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .quiz-layout { grid-template-columns: 1fr; }
        }

        .sidebar {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            align-self: start;
        }

        .timer-box {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--danger-color);
            padding: 0.5rem;
            border: 2px solid var(--danger-color);
            border-radius: 6px;
            margin-bottom: 1.5rem;
            background: #fff5f5;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .nav-btn {
            background-color: var(--neutral-light);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.5rem 0;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .nav-btn.active { background-color: var(--primary-color); color: white; }
        .nav-btn.answered { background-color: #dbeafe; color: var(--primary-color); }

        .main-panel {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .progress-container {
            background: var(--neutral-light);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress-bar { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.3s; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }

        /* Media renderer */
        .question-media { margin-bottom: 1.5rem; text-align: center; }
        .media-image { max-width: 100%; max-height: 300px; border-radius: 6px; border: 1px solid var(--border-color); }
        .media-video { max-width: 100%; max-height: 300px; border-radius: 6px; }
        .media-link { display: inline-block; color: var(--primary-color); font-weight: 600; text-decoration: underline; }

        .options-container { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .option-card {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-card.selected { background: #eff6ff; border-color: #3b82f6; }
        .option-prefix {
            width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; margin-right: 1rem; font-weight: bold; background: white;
        }
        .option-card.selected .option-prefix { background: var(--primary-color); color: white; }

        .action-container {
            display: flex; justify-content: space-between; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);
        }

        .btn { padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border-color); }

        /* Modal xác nhận nộp bài */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .modal-card h3 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--neutral-dark); }
        .modal-card p { margin-bottom: 1.5rem; color: #4b5563; }
        .modal-actions { display: flex; justify-content: center; gap: 1rem; }

        /* Giao diện kết quả */
        .result-layout {
            display: none;
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 2rem auto;
            border: 1px solid var(--border-color);
        }

        .result-header { text-align: center; margin-bottom: 2rem; }
        .score-display { font-size: 2.5rem; font-weight: 800; margin: 1rem 0; }
        .badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 9999px; font-weight: 700; font-size: 1.1rem; }
        .badge-success { background-color: #d1fae5; color: #065f46; }
        .badge-danger { background-color: #fee2e2; color: #991b1b; }

        .review-title { font-size: 1.3rem; font-weight: 700; margin-top: 2rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border-color); }
        .review-item { padding: 1.5rem; border-radius: 6px; margin: 1rem 0; background-color: #f8fafc; border-left: 4px solid var(--border-color); }
        .review-item.correct { border-left-color: var(--success-color); }
        .review-item.incorrect { border-left-color: var(--danger-color); }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: bold;
            flex-direction: column; gap: 1rem;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cổng Đánh Giá Năng Lực Thành Viên</h1>
    </header>

    <div class="container">
        <!-- Đăng nhập học viên -->
        <div class="auth-card" id="auth-screen">
            <h2>Đăng Nhập Khảo Sát</h2>
            <form id="auth-form" onsubmit="startQuiz(event)">
                <div class="form-group">
                    <label for="student-name">Họ và Tên <span style="color:red">*</span></label>
                    <input type="text" id="student-name" class="form-control" required placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label for="student-dept">Phòng ban <span style="color:red">*</span></label>
                    <input type="text" id="student-dept" class="form-control" required list="dept-suggestions" placeholder="Nhập hoặc chọn phòng ban...">
                    <datalist id="dept-suggestions">
                        <option value="TSSGN1">
                        <option value="DSHNI1">
                    </datalist>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Bắt đầu làm bài</button>
            </form>
        </div>

        <!-- Màn hình làm bài -->
        <div class="quiz-layout" id="quiz-screen">
            <div class="sidebar">
                <div class="timer-box" id="timer">30:00</div>
                <h4 id="sb-name">Học viên: -</h4>
                <p id="sb-dept" style="font-size: 0.9rem; color: #64748b; margin-bottom: 1rem;">Phòng: -</p>
                <hr>
                <div class="question-grid" id="nav-grid"></div>
            </div>

            <div class="main-panel">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div id="question-area">
                    <div id="question-index" style="color: #64748b; font-size: 0.9rem; font-weight: bold; margin-bottom: 0.5rem;">CÂU HỎI 1</div>
                    <div class="question-text" id="question-text">Đang tải câu hỏi từ hệ thống...</div>
                    <div id="media-area"></div>
                    <div class="options-container" id="options-container"></div>
                </div>
                <div class="action-container">
                    <button class="btn btn-outline" id="btn-prev" onclick="navigate(-1)">Quay lại</button>
                    <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">Tiếp theo</button>
                    <button class="btn btn-success" id="btn-submit" onclick="showConfirmModal()">Nộp bài</button>
                </div>
            </div>
        </div>

        <!-- Giao diện kết quả -->
        <div class="result-layout" id="result-screen">
            <div class="result-header">
                <h2>Kết Quả Đánh Giá</h2>
                <div class="score-display" id="score-text">0/0</div>
                <div id="badge-container"></div>
                <p id="eval-feedback" style="margin-top: 1rem; font-size: 1.1rem; color: #4b5563;"></p>
            </div>
            
            <div class="review-title">Đánh giá chi tiết từng câu</div>
            <div id="review-container"></div>
        </div>
    </div>

    <!-- Modal xác nhận nộp bài -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-card">
            <h3>Xác Nhận Nộp Bài</h3>
            <p id="modal-alert-text">Bạn đã sẵn sàng nộp bài làm lên hệ thống đánh giá?</p>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeConfirmModal()">Làm tiếp</button>
                <button class="btn btn-success" onclick="submitQuiz()">Đồng ý nộp</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div id="loading-text">Đang kết nối cơ sở dữ liệu hệ thống...</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqFBqnkI32xXYKP7Z7q3Qq13UA3-wCHeyuC-xDvx-0ur8dKr2p6Ee_2VhDQA3DMLs7tQ/exec";
        
        let questions = [];
        let answers = {};
        let currentIdx = 0;
        let timeRemaining = 30 * 60; // 30 phút mặc định
        let timerInterval = null;

        // Tự động kiểm tra phiên làm bài cũ trong sessionStorage khi tải trang
        window.onload = function() {
            const savedSession = sessionStorage.getItem('active_quiz_session');
            if (savedSession) {
                const sessionData = JSON.parse(savedSession);
                studentName = sessionData.name;
                studentDept = sessionData.dept;
                questions = sessionData.questions;
                answers = sessionData.answers;
                currentIdx = sessionData.currentIdx;
                timeRemaining = sessionData.timeRemaining;
                
                document.getElementById('student-name').value = studentName;
                document.getElementById('student-dept').value = studentDept;
                
                document.getElementById('sb-name').textContent = "Học viên: " + studentName;
                document.getElementById('sb-dept').textContent = "Phòng: " + studentDept;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'grid';
                
                initNavGrid();
                loadQuestion(currentIdx);
                startTimer();
            }
        };

        function saveSession() {
            if (questions.length === 0) return;
            const sessionData = {
                name: studentName,
                dept: studentDept,
                questions: questions,
                answers: answers,
                currentIdx: currentIdx,
                timeRemaining: timeRemaining
            };
            sessionStorage.setItem('active_quiz_session', JSON.stringify(sessionData));
        }

        function startQuiz(event) {
            event.preventDefault();
            studentName = document.getElementById('student-name').value.trim();
            studentDept = document.getElementById('student-dept').value.trim();

            if (!studentName || !studentDept) return;

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').textContent = "Đang đồng bộ cơ sở dữ liệu khóa khảo sát...";

            // Tải đề thi từ Apps Script
            fetch(`${SCRIPT_URL}?action=get_questions`)
                .then(res => {
                    if (!res.ok) throw new Error("Yêu cầu tải đề không thành công.");
                    return res.json();
                })
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    if (data.status === "success") {
                        questions = data.questions;
                        
                        // Xáo trộn đáp án ngẫu nhiên ngay lúc tải đề
                        questions.forEach(q => {
                            q.shuffledKeys = ['A', 'B', 'C'].sort(() => Math.random() - 0.5);
                        });

                        document.getElementById('sb-name').textContent = "Học viên: " + studentName;
                        document.getElementById('sb-dept').textContent = "Phòng: " + studentDept;
                        
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('quiz-screen').style.display = 'grid';

                        initNavGrid();
                        loadQuestion(0);
                        startTimer();
                        saveSession();
                    } else {
                        alert("Không thể tải cấu trúc đề thi: " + data.message);
                    }
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    alert("Kết nối máy chủ thất bại: " + err.message);
                });
        }

        function initNavGrid() {
            const grid = document.getElementById('nav-grid');
            grid.innerHTML = '';
            questions.forEach((_, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.id = `nav-btn-${idx}`;
                btn.textContent = idx + 1;
                btn.onclick = () => loadQuestion(idx);
                grid.appendChild(btn);
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            questions.forEach((_, idx) => {
                const btn = document.getElementById(`nav-btn-${idx}`);
                if (btn) {
                    btn.classList.remove('answered');
                    if (answers[idx]) btn.classList.add('answered');
                }
            });
        }

        function loadQuestion(idx) {
            currentIdx = idx;
            const q = questions[idx];

            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                btn.classList.remove('active');
                if (i === idx) btn.classList.add('active');
            });

            document.getElementById('question-index').textContent = `CÂU HỎI ${idx + 1} CỦA ${questions.length}`;
            document.getElementById('question-text').textContent = q.question;

            // Xử lý hiển thị ảnh/video minh họa
            const mediaArea = document.getElementById('media-area');
            mediaArea.innerHTML = renderMedia(q.media);

            // Hiển thị các lựa chọn phương án (đã xáo trộn)
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.shuffledKeys.forEach(key => {
                const card = document.createElement('div');
                card.className = `option-card ${answers[idx] === key ? 'selected' : ''}`;
                card.onclick = () => selectOption(key);
                card.innerHTML = `
                    <div class="option-prefix">${key}</div>
                    <div class="option-text">${q.options[key]}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('btn-prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
            if (idx === questions.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'block';
            } else {
                document.getElementById('btn-next').style.display = 'block';
                document.getElementById('btn-submit').style.display = 'none';
            }

            const percent = ((idx + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            
            saveSession();
        }

        function renderMedia(mediaUrl) {
            if (!mediaUrl) return "";
            const urls = mediaUrl.split(',').map(url => url.trim());
            let html = '<div class="question-media">';
            urls.forEach(url => {
                if (url.match(/\.(jpeg|jpg|gif|png|webp)/i)) {
                    html += `<img src="${url}" class="media-image" alt="Hình ảnh minh họa">`;
                } else if (url.match(/\.(mp4|webm|ogg)/i)) {
                    html += `<video src="${url}" controls class="media-video"></video>`;
                } else if (url !== "") {
                    html += `<a href="${url}" target="_blank" class="media-link">Xem tài liệu đính kèm</a>`;
                }
            });
            html += '</div>';
            return html;
        }

        function selectOption(key) {
            answers[currentIdx] = key;
            document.getElementById(`nav-btn-${currentIdx}`).classList.add('answered');
            loadQuestion(currentIdx);
        }

        function navigate(dir) {
            const target = currentIdx + dir;
            if (target >= 0 && target < questions.length) {
                loadQuestion(target);
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("Đã hết thời gian làm bài! Hệ thống tự động nộp bài làm.");
                    submitQuiz();
                } else {
                    const mins = Math.floor(timeRemaining / 60);
                    const secs = timeRemaining % 60;
                    document.getElementById('timer').textContent = 
                        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function showConfirmModal() {
            const answeredCount = Object.keys(answers).length;
            const unanswered = questions.length - answeredCount;
            const alertText = document.getElementById('modal-alert-text');
            
            if (unanswered > 0) {
                alertText.innerHTML = `Bạn còn <span style="color:red; font-weight:bold;">${unanswered} câu chưa hoàn thành</span>. Bạn có thực sự muốn nộp bài?`;
            } else {
                alertText.textContent = "Bạn đã hoàn thành đầy đủ tất cả các câu hỏi. Bạn có chắc chắn muốn nộp bài?";
            }
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').style.display = 'none';
        }

        function submitQuiz() {
            closeConfirmModal();
            clearInterval(timerInterval);
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').textContent = "Đang tính toán kết quả và mã hóa dữ liệu nộp bài...";

            const url = `${SCRIPT_URL}?action=save`
                + `&name=${encodeURIComponent(studentName)}`
                + `&department=${encodeURIComponent(studentDept)}`
                + `&answers=${encodeURIComponent(JSON.stringify(answers))}`;

            fetch(url, { method: "GET", redirect: "follow" })
                .then(res => {
                    if (!res.ok) throw new Error("Gửi dữ liệu nộp bài không thành công.");
                    return res.json();
                })
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    if (data && data.status === "success") {
                        // Xóa sạch session của bài làm hiện tại sau khi đã nộp thành công
                        sessionStorage.removeItem('active_quiz_session');
                        showResults(data);
                    } else {
                        alert("Lỗi máy chủ phản hồi: " + (data.message || "Không xác định"));
                    }
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    alert("Lỗi nộp bài lên hệ thống cơ sở dữ liệu: " + err.message);
                });
        }

        function showResults(data) {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            document.getElementById('score-text').textContent = `${data.score}/${data.total}`;
            
            const badgeContainer = document.getElementById('badge-container');
            const feedbackText = document.getElementById('eval-feedback');
            
            if (data.percentage >= 80) { // Tỷ lệ đạt tối thiểu 80%
                badgeContainer.innerHTML = '<span class="badge badge-success">KẾT QUẢ: ĐẠT</span>';
                feedbackText.textContent = "Xin chúc mừng! Bạn đã hoàn thành xuất sắc đợt khảo sát đánh giá năng lực.";
            } else {
                badgeContainer.innerHTML = '<span class="badge badge-danger">KẾT QUẢ: CHƯA ĐẠT</span>';
                feedbackText.textContent = "Bạn chưa đạt ngưỡng điểm chuẩn yêu cầu (80%). Hãy tiếp tục ôn tập kiến thức.";
            }

            // Kết xuất phần phân tích câu hỏi chi tiết sau khi chấm điểm
            const revContainer = document.getElementById('review-container');
            revContainer.innerHTML = '';

            data.review.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `review-item ${item.correct ? 'correct' : 'incorrect'}`;

                let mediaHtml = renderMedia(item.media);

                card.innerHTML = `
                    <div style="font-weight:700; margin-bottom:0.5rem;">Câu ${idx + 1}: ${item.question}</div>
                    ${mediaHtml}
                    <div style="margin-top:0.5rem; font-size:0.95rem;">
                        <div>• Lựa chọn của bạn: <span class="${item.correct ? 'text-success' : 'text-danger'}" style="font-weight:600;">
                            ${item.chosen ? item.chosen + '. ' + item.options[item.chosen] : 'Chưa trả lời'}
                        </span></div>
                        ${!item.correct ? `
                            <div style="margin-top:0.25rem;">• Đáp án chính xác: <span style="color:var(--success-color); font-weight:600;">
                                ${item.correctKey}. ${item.options[item.correctKey]}
                            </span></div>
                        ` : ''}
                    </div>
                `;
                revContainer.appendChild(card);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
